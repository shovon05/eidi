<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Salami Spinner</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="header">
        <h1>ঈদ মোবারক!</h1>
        <p>EID SALAMI SPINNER</p>
    </div>

    <div class="input-section">
        <label>আপনার নাম লিখুন</label>
        <input type="text" id="nameInput" placeholder="Enter your name...">
    </div>

    <div class="wheel-container">
        <div class="wheel" id="wheel">
            <div class="segment-text text-1">৳100</div>
            <div class="segment-text text-2">৳500</div>
            <div class="segment-text text-3">৳1000</div>
            <div class="segment-text text-4">দোয়া</div>
            <div class="segment-text text-5">৳50</div>
            <div class="segment-text text-6">৳20</div>
        </div>
    </div>

    <button class="spin-btn" onclick="spinWheel()">SPIN</button>

    <div class="footer">
        MADE BY <span>shovon</span>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay"></div>

    <div class="modal" id="resultModal">
        <h2 id="resultMessage"></h2>
        <h1 id="resultValue"></h1>
        <button class="spin-btn small" onclick="closeModal()">OK</button>
    </div>

    <!-- JS -->
    <script src="app.js"></script>
</body>
</html>
